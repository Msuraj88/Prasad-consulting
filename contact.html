<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact Prasad Consulting — Hyderabad, India">
  <title>Contact Us | Prasad Consulting</title>
  <link rel="icon" href="assets/fevicon.png" type="image/png">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/footer.css">
</head>
<body>

  <div id="header"></div>

  <main class="page-content">

    <section class="page-banner fade-up">
      <div class="container">
        <h1 class="page-banner__title">Contact Us</h1>
        <p class="page-banner__subtitle">Get in touch with our team in Hyderabad</p>
      </div>
    </section>

    <section class="fade-up">
      <div class="container">
        <div class="row g-5 justify-content-center">
          <div class="col-lg-5">
            <h2 class="section-title">Reach Us</h2>
            <p class="text-secondary">Prasad Consulting<br>Hyd (India)</p>
            <p class="text-secondary mb-0">Email and phone details will be added here.</p>
          </div>
          <div class="col-lg-5">
            <h2 class="section-title">Send a Message</h2>
            <form class="contact-form" action="#" method="post">
              <div class="mb-3">
                <label for="name" class="form-label">Name</label>
                <input type="text" class="form-control" id="name" name="name" required>
              </div>
              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email" required>
              </div>
              <div class="mb-3">
                <label for="message" class="form-label">Message</label>
                <textarea class="form-control" id="message" name="message" rows="4" required></textarea>
              </div>
              <button type="submit" class="btn btn-primary">Send Message</button>
            </form>
          </div>
        </div>
      </div>
    </section>

  </main>

  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/partials.js"></script>
  <script src="js/include.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
