<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Services offered by Prasad Consulting">
  <title>Services | Prasad Consulting</title>
  <link rel="icon" href="assets/fevicon.png" type="image/png">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/services.css">
  <link rel="stylesheet" href="css/footer.css">
</head>
<body>

  <div id="header"></div>

  <main class="page-content svc-page">

    <section class="svc-hero">
      <div class="container">
        <h1 class="svc-hero__title">Services</h1>
        <span class="svc-hero__rule" aria-hidden="true"></span>
      </div>
    </section>

    <section id="advisory" class="svc-overview fade-up" aria-labelledby="svc-overview-heading">
      <div class="container">
        <p class="svc-overview__eyebrow" id="svc-overview-heading">
          <span class="svc-overview__eyebrow-line" aria-hidden="true"></span>
          Services Overview
          <span class="svc-overview__eyebrow-line" aria-hidden="true"></span>
        </p>
        <p class="svc-overview__subtitle">Explore our core service categories</p>

        <div class="svc-tabs-wrap" id="svcTabsWrap">
          <div class="svc-tabs" id="svcTabs" role="tablist" aria-label="Service categories"></div>
          <p class="svc-tabs__scroll-hint" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M8 8l4 4-4 4M16 8l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Swipe to explore
          </p>
        </div>

        <div class="svc-panel">
          <div class="svc-panel__side">
            <ul class="svc-sublist" id="svcList" role="tablist" aria-label="Sub-services" aria-orientation="vertical"></ul>
            <a href="contact.html" class="svc-panel__cta">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><rect x="4" y="5" width="16" height="16" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M4 9h16M8 3v4M16 3v4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
              Schedule a Consultation
            </a>
          </div>
          <div class="svc-panel__content" id="svcDetail" role="tabpanel" aria-live="polite"></div>
        </div>
      </div>
    </section>

  </main>

  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/partials.js"></script>
  <script src="js/include.js"></script>
  <script src="js/main.js"></script>
  <script src="js/services-data.js"></script>
  <script src="js/services.js"></script>
</body>
</html>
