<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Services offered by Prasad Consulting">
  <title>Services | Prasad Consulting</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/footer.css">
</head>
<body>

  <div id="header"></div>

  <main class="page-content">

    <section class="page-banner fade-up">
      <div class="container">
        <h1 class="page-banner__title">Our Services</h1>
        <p class="page-banner__subtitle">Consulting, advisory, and training solutions</p>
      </div>
    </section>

    <section id="advisory" class="fade-up">
      <div class="container">
        <div class="row g-4">
          <div class="col-md-4">
            <div class="service-card h-100 p-4 bg-light rounded">
              <h2 class="h5 section-title">Consulting</h2>
              <p class="text-secondary mb-0">Strategic consulting services placeholder.</p>
            </div>
          </div>
          <div class="col-md-4">
            <div class="service-card h-100 p-4 bg-light rounded">
              <h2 class="h5 section-title">Advisory</h2>
              <p class="text-secondary mb-0">Expert advisory services placeholder.</p>
            </div>
          </div>
          <div class="col-md-4" id="training">
            <div class="service-card h-100 p-4 bg-light rounded">
              <h2 class="h5 section-title">Training</h2>
              <p class="text-secondary mb-0">Webinars and masterclasses placeholder.</p>
            </div>
          </div>
        </div>
      </div>
    </section>

  </main>

  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/partials.js"></script>
